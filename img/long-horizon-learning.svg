<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#94a3b8"/>
    </marker>
    <marker id="arrBlue" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2563eb"/>
    </marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Agent box -->
  <rect x="120" y="36" width="140" height="40" rx="8" fill="#2563eb" filter="url(#sh)"/>
  <text x="190" y="55" text-anchor="middle" font-size="12" font-weight="700" fill="white">Discovery Agent</text>
  <text x="190" y="69" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.8)">LLM + policy</text>

  <!-- Arrow down to trajectory -->
  <line x1="190" y1="76" x2="190" y2="96" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Long trajectory box -->
  <rect x="30" y="100" width="320" height="55" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.2" filter="url(#sh)"/>
  <text x="190" y="117" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Long-Horizon Discovery Trajectory</text>

  <!-- Step circles -->
  <circle cx="65" cy="138" r="10" fill="#2563eb" fill-opacity="0.1" stroke="#2563eb" stroke-width="1"/>
  <text x="65" y="142" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">s₁</text>

  <line x1="75" y1="138" x2="100" y2="138" stroke="#cbd5e1" stroke-width="1" marker-end="url(#arr)"/>

  <circle cx="112" cy="138" r="10" fill="#2563eb" fill-opacity="0.1" stroke="#2563eb" stroke-width="1"/>
  <text x="112" y="142" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">s₂</text>

  <line x1="122" y1="138" x2="147" y2="138" stroke="#cbd5e1" stroke-width="1" marker-end="url(#arr)"/>

  <circle cx="159" cy="138" r="10" fill="#2563eb" fill-opacity="0.1" stroke="#2563eb" stroke-width="1"/>
  <text x="159" y="142" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">s₃</text>

  <text x="190" y="142" text-anchor="middle" font-size="12" fill="#94a3b8">···</text>

  <circle cx="218" cy="138" r="10" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="1"/>
  <text x="218" y="142" text-anchor="middle" font-size="7" font-weight="600" fill="#2563eb">sₙ₋₁</text>

  <line x1="228" y1="138" x2="253" y2="138" stroke="#cbd5e1" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Final outcome with star -->
  <circle cx="265" cy="138" r="12" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="265" y="142" text-anchor="middle" font-size="8" font-weight="700" fill="#d97706">sₙ</text>

  <line x1="277" y1="138" x2="310" y2="138" stroke="#cbd5e1" stroke-width="1"/>
  <text x="325" y="142" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">outcome</text>

  <!-- Three feedback types -->
  <!-- Sparse outcome -->
  <line x1="265" y1="155" x2="265" y2="180" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="185" y="183" width="160" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" filter="url(#sh)"/>
  <text x="265" y="201" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Sparse Outcome Reward</text>

  <!-- Process feedback -->
  <line x1="159" y1="155" x2="112" y2="180" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrBlue)"/>

  <rect x="25" y="183" width="145" height="28" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1" filter="url(#sh)"/>
  <text x="97" y="201" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Intermediate Signals</text>

  <!-- Arrow down to learning methods -->
  <line x1="190" y1="215" x2="190" y2="235" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="190" y="230" text-anchor="middle" font-size="8" fill="#94a3b8">integrate</text>

  <!-- Learning methods row -->
  <rect x="10" y="242" width="108" height="38" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.2" filter="url(#sh)"/>
  <text x="64" y="257" text-anchor="middle" font-size="8.5" font-weight="600" fill="#334155">Multi-Turn RL</text>
  <text x="64" y="270" text-anchor="middle" font-size="7.5" fill="#64748b">credit assignment</text>

  <rect x="128" y="242" width="118" height="38" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.2" filter="url(#sh)"/>
  <text x="187" y="257" text-anchor="middle" font-size="8.5" font-weight="600" fill="#334155">Self-Rewarding</text>
  <text x="187" y="270" text-anchor="middle" font-size="7.5" fill="#64748b">no external reward</text>

  <rect x="256" y="242" width="114" height="38" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.2" filter="url(#sh)"/>
  <text x="313" y="257" text-anchor="middle" font-size="8.5" font-weight="600" fill="#334155">Domain Adaptation</text>
  <text x="313" y="270" text-anchor="middle" font-size="7.5" fill="#64748b">continual pre-training</text>

  <!-- Feedback loop arrow back to agent -->
  <path d="M 190,280 L 190,300 L 370,300 L 370,56 L 260,56" fill="none" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrBlue)"/>
  <text x="370" y="180" text-anchor="middle" font-size="8" fill="#2563eb" font-weight="600" transform="rotate(90, 370, 180)">improved agent</text>
</svg>
